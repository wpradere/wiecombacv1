# ============================================================
# WIIMY Backend — application.yml
# ============================================================

server:
  port: 8080

# ── Database (PostgreSQL) ─────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/wiimybd
    username: wiimy_user
    password: "da1por#t=?"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000

  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages DDL; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Mail (SMTP — Gmail; override with env vars in production) ─────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:storewiimy@gmail.com}
    password: ${MAIL_PASSWORD:twaxfxhvnrzdfoha}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ── App custom properties ─────────────────────────────────────────────────────
app:
  mail:
    from: ${MAIL_FROM:WIIMY Store <storewiimy@gmail.com>}
    admin: ${MAIL_ADMIN:admin@wiimy.store}
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:3001
  cookie:
    # Set to true in production once HTTPS is configured
    secure: ${COOKIE_SECURE:false}

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.wiimy: DEBUG
    org.flywaydb: INFO
    org.springframework.web: INFO

# ── OpenAPI / Swagger UI ──────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
